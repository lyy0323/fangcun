<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 背景 -->
  <rect width="512" height="512" rx="64" fill="#ffffff"/>

  <!--
    "寸" 解构三元素:
    - 横 (平): #559977
    - 竖 (仄): #557799
    - 点 (字): #995577

    笔画布局参考 "寸" 字结构:
    横在上部偏中，竖从横中偏右下行，点在左下
  -->

  <!-- 横 — 平声 (水平线) -->
  <rect x="116" y="168" width="280" height="32" rx="4" fill="#559977"/>

  <!-- 竖 — 仄声 (垂直线, 上方出头与横线右侧等量) -->
  <!-- 横线右端 = 116+280 = 396, 竖线左边 = 296, 出头量 = 396-296-32 = 68 -->
  <rect x="296" y="100" width="32" height="308" rx="4" fill="#557799"/>

  <!-- 点 — 字/格子 (小方块) -->
  <rect x="176" y="272" width="48" height="48" rx="6" fill="#995577"/>
</svg>
